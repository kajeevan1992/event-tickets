services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: desi_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  api:
    build: ./apps/api
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/desi_events
      JWT_SECRET: change-me
      FRONTEND_URL: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      - db
  web:
    build: ./apps/web
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - api
volumes:
  postgres_data:
